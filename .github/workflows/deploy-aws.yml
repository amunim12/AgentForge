name: Deploy (AWS)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:
    inputs:
      apply_terraform:
        description: "Run terraform apply (otherwise: image-only deploy)"
        required: false
        default: "false"

permissions:
  id-token: write   # OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.5

jobs:
  guard:
    name: Should we deploy?
    runs-on: ubuntu-latest
    if: vars.AWS_DEPLOY_ENABLED == 'true'
    outputs:
      go: ${{ steps.gate.outputs.go }}
    steps:
      - id: gate
        run: echo "go=true" >> "$GITHUB_OUTPUT"

  terraform:
    name: Terraform plan/apply
    needs: guard
    if: needs.guard.outputs.go == 'true' && (github.event_name == 'workflow_dispatch' && inputs.apply_terraform == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform apply
        env:
          TF_VAR_app_secret_values: ${{ secrets.APP_SECRET_VALUES_JSON }}
          TF_VAR_amplify_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
        run: terraform apply -auto-approve

  build_and_deploy:
    name: Build image + redeploy ECS
    needs: guard
    if: needs.guard.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" -f backend/Dockerfile backend/
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Force ECS service redeploy
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[0].id' \
            --output text

      - name: Wait for service stable
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
