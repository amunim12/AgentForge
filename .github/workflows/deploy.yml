name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    if: ${{ vars.RENDER_DEPLOY_ENABLED == 'true' }}
    environment:
      name: production
      url: ${{ vars.BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsSL "${{ vars.BACKEND_URL }}/health" >/dev/null; then
              echo "Backend healthy."
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 10
          done
          echo "::error::Backend did not become healthy in time."
          exit 1

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ always() && vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy (Vercel)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
